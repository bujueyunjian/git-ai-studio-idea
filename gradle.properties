pluginGroup = com.gitaistudio
pluginName = git-ai-studio-idea
pluginVersion = 0.4.0

# 插件兼容的最低 IDE 构建号(2024.3 = 243);JCEF 内置、JDK 21 要求均从此版本起满足
pluginSinceBuild = 243

# 编译/打包所依赖的目标 IDE 版本(社区版)。可改为本机已装版本以加速本地构建
platformVersion = 2024.3.5

pluginRepositoryUrl = https://github.com/bujueyunjian/git-ai-studio-idea

# 平台自带 Kotlin 运行时,插件不再打包 stdlib
kotlin.stdlib.default.dependency = false

# 关闭配置缓存:含 pnpm 的 Exec 任务与 config cache 序列化约束易冲突,稳妥起见关掉(可后续再开)
org.gradle.configuration-cache = false
org.gradle.caching = true
org.gradle.jvmargs = -Xmx2g -XX:+UseParallelGC -Dfile.encoding=UTF-8
